name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: terminal-studio.exe
            asset: terminal-studio-windows.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: terminal-studio
            asset: terminal-studio-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: terminal-studio
            asset: terminal-studio-macos-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libxkbcommon-dev libwayland-dev libx11-dev libxcb1-dev
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binary
        shell: bash
        run: mv target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Delete pre-existing release
        run: gh release delete "$TAG" --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            terminal-studio-windows.exe
            terminal-studio-linux
            terminal-studio-macos-arm

  cleanup-on-failure:
    needs: [build, release]
    if: ${{ always() && (needs.build.result == 'failure' || needs.release.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Delete incomplete release
        run: gh release delete "$TAG" --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
